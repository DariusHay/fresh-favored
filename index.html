<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6B3F22" />
    <meta
      name="description"
      content="Fresh & Favored and 5 Bro's Sweets & Treats serves Orlando with soul food, seafood, cakes, homemade drinks, private dinners, catering, and curated retail."
    />
    <meta property="og:title" content="Fresh & Favored | Where Fashion meets Flavor" />
    <meta
      property="og:description"
      content="Catering, private dinners, sweets, homemade drinks, fedoras, perfume oils, and designer purses in Orlando and surrounding areas."
    />
    <meta property="og:type" content="website" />
    <title>Fresh & Favored | Where Fashion meets Flavor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" type="email" />
      <input name="phone" />
      <select name="service">
        <option>Catering</option>
        <option>Private Dinner</option>
        <option>Cakes or Sweets</option>
        <option>Plates or Family Meals</option>
        <option>Retail</option>
        <option>Other</option>
      </select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
